- name: Player
  description: >
    There can be 2 to 4 players.
- name: Card
  description: >
    A game tile that has a number from 1 to 13 and a color (yellow, red, blue, black), or it is a joker (black or red).
- name: Joker
  description: >
    A tile that can replace any other tile: its color and number are whatever the player wants.
- name: Point
  description: >
    The point value of a tile is the number printed on it. The points of a combination equal the sum of each tile's points.
- name: Draw stack
  description: >
    The pile of tiles that players draw from.
- name: Start
  description: >
    Playing tiles for the first time in a game is a "start."
    For a player to start, the combination(s) they place on the table must be worth at least 30 points.
    A player who has "started" is one who has placed tiles on the table.
- name: Turn
  description: >
    A turn during which a player can play (if they have started) or draw a tile.
    If the player cannot start, they draw and end their turn.
- name: Combination
  description: >
    A group of tiles. Can be either a run or a group (set).
- name: Card serie
  description: >
    A group of at least 3 and at most 4 tiles with the same number but different colors.
    Valid example: 3 red, 3 yellow, 3 blue
    Invalid examples:
    - 3 red, 3 blue (only 2 tiles)
    - 3 red, 3 red, 3 yellow (duplicate color)
    - 3 red, 3 yellow, 4 blue (different numbers)
- name: Card suite
  description: >
    A run of at least 3 and at most 13 tiles of the same color with consecutive numbers.
    Valid example: 1 red, 2 red, 3 red, 4 red
    Invalid examples:
    - 1 red, 2 red (only 2 tiles)
    - 1 red, 2 black, 3 red (mixed colors)
    - 1 red, 3 red, 4 red (not consecutive)
